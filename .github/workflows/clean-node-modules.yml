name: Clean node_modules

on:
  workflow_dispatch:

jobs:
  clean:
    name: Remove node_modules & npm cache
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove node_modules and build output
        run: |
          rm -rf node_modules .next
          echo "Removed node_modules and .next (if present)."

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Delete GitHub Actions caches
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            let page = 1;
            let deleted = 0;

            while (true) {
              const { data } = await github.rest.actions.getActionsCacheList({
                owner,
                repo,
                per_page: 100,
                page,
              });

              const caches = data.actions_caches ?? [];
              if (caches.length === 0) break;

              for (const cache of caches) {
                await github.rest.actions.deleteActionsCacheById({
                  owner,
                  repo,
                  cache_id: cache.id,
                });
                deleted += 1;
                console.log(`Deleted cache: ${cache.key} (${cache.ref})`);
              }

              if (caches.length < 100) break;
              page += 1;
            }

            console.log(`Done. Deleted ${deleted} GitHub Actions cache entries.`);
